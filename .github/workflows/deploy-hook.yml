name: Trigger Vercel rebuild

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Force Vercel rebuild
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured, skipping"
            exit 0
          fi
          curl -s -X POST \
            "https://api.vercel.com/v13/deployments?forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "builder-weekly-v2",
              "target": "production",
              "gitSource": {
                "type": "github",
                "org": "thebuilderweekly",
                "repo": "builder-weekly-v2",
                "ref": "main"
              }
            }'
